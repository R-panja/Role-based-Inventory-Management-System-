<!DOCTYPE html>
<html>
<head>
    <title>Password Changed</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Auto redirect -->
    <script>
        setTimeout(function(){
            window.location.href = "/dashboard/";
        }, 4000);
    </script>

    <style>
        body {
            background-color: #f5f7fa;
        }
        .card {
            margin-top: 100px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card p-5">

        <h2 class="text-success mb-3">✅ Password Changed Successfully!</h2>

        <p class="text-muted">Redirecting to dashboard in 4 seconds...</p>

        <a href="/dashboard/" class="btn btn-primary mt-3">
            Go to Dashboard
        </a>

    </div>
</div>

</body>
</html>
