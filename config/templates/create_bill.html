<!DOCTYPE html>
<html>
<head>
    <title>Create Bill</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f7fa;
        }
        .card {
            max-width: 500px;
            margin: 60px auto;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card p-4">

        <h2 class="text-center mb-4">🧾 Create Bill</h2>

        <form method="POST">
            {% csrf_token %}

            <!-- Product -->
            <div class="mb-3">
                <label class="form-label">Select Product</label>
                <select name="product" class="form-select">
                    {% for p in products %}
                        <option value="{{ p.id }}">{{ p.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Quantity -->
            <div class="mb-3">
                <label class="form-label">Quantity</label>
                <input type="number" name="quantity" class="form-control"
                       min="1" step="1" required
                       oninput="this.value = Math.max(1, this.value)">
            </div>

            <!-- Manager -->
            <div class="mb-3">
                <label class="form-label">Select Manager</label>
                <select name="manager" class="form-select">
                    {% for m in managers %}
                        <option value="{{ m.id }}">{{ m.username }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Bill Type -->
            <div class="mb-3">
                <label class="form-label">Bill Type</label>
                <select name="bill_type" class="form-select">
                    <option value="sale">Sale Bill</option>
                    <option value="return">Return Bill</option>
                </select>
            </div>

            <!-- Button -->
            <div class="d-grid">
                <button type="submit" class="btn btn-primary">
                    Generate Bill
                </button>
            </div>

        </form>

    </div>
</div>

</body>
</html>
