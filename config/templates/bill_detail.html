<!DOCTYPE html>
<html>
<head>
    <title>Bill Details</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Auto redirect after 5 sec -->
    <script>
        setTimeout(function(){
            window.location.href = "/dashboard/";  // ✅ direct URL
        }, 5000);
    </script>

    <style>
        body {
            background-color: #f5f7fa;
        }
        .card {
            margin-top: 50px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .status {
            font-weight: bold;
            padding: 5px 10px;
            border-radius: 8px;
        }
        .approved { background-color: #d4edda; color: #155724; }
        .pending { background-color: #fff3cd; color: #856404; }
        .rejected { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>

<div class="container">
    <div class="card p-4">

        <h2 class="text-center mb-3">🧾 Bill #{{ bill.id }}</h2>

        <div class="d-flex justify-content-between mb-3">
            <h5>Total: <span class="text-success">₹ {{ bill.total_amount }}</span></h5>

            <h5>
                Status:
                <span class="status 
                    {% if bill.status == 'approved' %}approved
                    {% elif bill.status == 'rejected' %}rejected
                    {% else %}pending{% endif %}">
                    {{ bill.status|title }}
                </span>
            </h5>
        </div>

        <hr>

        <h5>Items:</h5>

        <table class="table table-striped mt-3">
            <thead class="table-dark">
                <tr>
                    <th>Product</th>
                    <th>Quantity</th>
                </tr>
            </thead>
            <tbody>
                {% for item in bill.items.all %}
                <tr>
                    <td>{{ item.product.name }}</td>
                    <td>{{ item.quantity }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <div class="text-center mt-4">
            <p class="text-muted">Redirecting to dashboard in 5 seconds...</p>
            <a href="/dashboard/" class="btn btn-primary">
                Go Now
            </a>
        </div>

    </div>
</div>

</body>
</html>
